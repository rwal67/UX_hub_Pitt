<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pitt HCI Course Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-left">
      <span class="header-pitt">Pitt</span>
      <span class="header-divider">|</span>
      <span class="header-name">HCI / UX Course Hub</span>
      <img src="cathy.svg" alt="Pitt HCI" class="header-logo">
    </div>
  </div>
  <nav class="header-nav">
    <div class="header-nav-inner">
      <a class="nav-link" href="https://www.dnid.pitt.edu/" target="_blank">DNID @ Pitt</a>
      <a class="nav-link" href="https://vml.pitt.edu/">Vibrant Media Lab</a>
      <a class="nav-link" href="https://www.cs.pitt.edu/research/areas/human-computer-interaction" target="_blank">HCI @ Pitt</a>
      
    </div>
  </nav>
</header>

<main>
  <section id="disciplines" class="disciplines-section">
    <div class="section-band">
      <span>Explore Disciplines</span>
    </div>
    <div class="disciplines-body">
      <div class="disc-pill-row" id="discPillRow"></div>
      <div class="disc-detail" id="discDetail" style="display:none;">
        <h2 id="discDetailTitle"></h2>
        <p id="discDetailDesc"></p>
        <div class="disc-skills" id="discDetailSkills"></div>
        <div class="disc-careers">
          <h4>Career Paths</h4>
          <div id="discDetailCareers"></div>
        </div>
        <div class="disc-courses">
          <h4>Related Courses</h4>
          <ul id="discDetailCourses"></ul>
        </div>
      </div>
    </div>
  </section>

  <section id="cart" class="hub-container" style="display:none;" id="cartPanel">
    <div class="section-band-navy">
      <span>Your Course Cart</span>
      <span class="cart-count" id="cartCount">0 courses</span>
    </div>
    <div class="col-header">
      <div>Course</div>
      <div>Cr.</div>
      <div class="col-skill">Category</div>
      <div class="col-prereq">Prerequisites</div>
      <div></div>
    </div>
    <div id="cartItems" class="course-list"></div>
    <div class="cart-skills-bar" id="cartSkillsBar" style="display:none;">
      <span class="cart-skills-label">Skills:</span>
      <div id="cartSkillCounts" class="skill-tags-container"></div>
    </div>
  </section>

  <section id="courses" class="hub-container">
    <div class="section-band-navy collapsible" onclick="toggleCourses()">
      <span>Course Catalog</span>
      <svg class="section-chevron open" id="coursesChevron" viewBox="0 0 10 10"><polyline points="3,2 7,5 3,8"/></svg>
    </div>
    <div id="coursesBody">
      <div class="filter-bar">
        <select class="filter-pill" id="catSelect" onchange="render()">
          <option value="">Scaffolding / Discipline: Any</option>
        </select>
        <select class="filter-pill" id="prereqSelect" onchange="render()">
          <option value="">PreReq: Any</option>
          <option value="no">PreReq: No</option>
          <option value="yes">PreReq: Yes</option>
        </select>
        <select class="filter-pill" id="creditsSelect" onchange="render()">
          <option value="">Credits: Any</option>
          <option value="3">Credits: 3</option>
        </select>
        <button class="clear-btn" onclick="clearFilters()">✕ Clear</button>
      </div>
      <div class="results-bar" id="resultsBar"></div>
      <div class="col-header">
        <div>Course</div>
        <div>Cr.</div>
        <div class="col-skill">Category</div>
        <div class="col-prereq">Prerequisites</div>
        <div></div>
      </div>
      <div class="course-list" id="courseList"></div>
    </div>
  </section>

</main>

<script>
function toggleCourses() {
  const body    = document.getElementById('coursesBody');
  const chevron = document.getElementById('coursesChevron');
  const isOpen  = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  chevron.classList.toggle('open', !isOpen);
}
</script>
<script src="script.js"></script>
</body>
</html>
